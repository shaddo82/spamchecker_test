<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>적당한 스팸 판별기 (AI Spam Checker)</title>
</head>
<body>
    <h1>스팸 판별기</h1>
    <textarea id="text" rows="5" cols="60"
        placeholder="스팸으로 의심되는 메시지를 붙여주세요!"></textarea><br><br>
    <button onclick="classify()">스팸 탐지</button>
    <h3 id="result"></h3>
    <script>
        function classify() {
            const text = document.getElementById("text").value;

            //  ISSUE2: Empty Input 처리
            const result = document.getElementById("result");
            if (!text) {
                result.innerText = "메시지를 입력해 주세요!";
                return;
            }

            fetch("/classify", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json" //fix
                },
                body: JSON.stringify({text})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerText =
                    "결과: " + data.label + " (score=" + data.score + ")";
            })
            .catch(() => {
                document.getElementById("result").innerText = "에러 발생";
            });
        }
    </script>
</body>
</html>
